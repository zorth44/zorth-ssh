name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Linux ARM64（银河麒麟 V10 兼容）─────────────────────────────────
  # 在真实 ARM64 机器上运行 Ubuntu 20.04 容器，glibc 2.31 与麒麟 V10 一致
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git curl build-essential python3 fakeroot libatomic1
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: npm install

      - name: Build
        run: npm run dist:linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: dist/*.AppImage

  # ── Windows x64 ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Build
        run: npm run dist:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.exe

  # ── 创建 GitHub Release，附上所有安装包 ──────────────────────────────
  release:
    needs: [build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-arm64/*.AppImage
            windows-x64/*.exe
